basePath: /api/v1
definitions:
  domain.CreateCustomerRequest:
    properties:
      email:
        type: string
      name:
        type: string
    required:
    - email
    - name
    type: object
  domain.CreateOrderItemRequest:
    properties:
      product_id:
        type: string
      quantity:
        type: integer
    required:
    - product_id
    - quantity
    type: object
  domain.CreateOrderRequest:
    properties:
      customer_id:
        type: string
      items:
        items:
          $ref: '#/definitions/domain.CreateOrderItemRequest'
        minItems: 1
        type: array
    required:
    - customer_id
    - items
    type: object
  domain.CreateProductRequest:
    properties:
      name:
        type: string
      price:
        type: number
    required:
    - name
    - price
    type: object
  domain.Customer:
    properties:
      email:
        type: string
      id:
        type: string
      name:
        type: string
    type: object
  domain.Order:
    properties:
      customer_id:
        type: string
      id:
        type: string
      items:
        items:
          $ref: '#/definitions/domain.OrderItem'
        type: array
      order_date:
        type: string
      status:
        type: string
    type: object
  domain.OrderItem:
    properties:
      id:
        type: string
      order_id:
        type: string
      price:
        type: number
      product_id:
        type: string
      quantity:
        type: integer
    type: object
  domain.Product:
    properties:
      id:
        type: string
      name:
        type: string
      price:
        type: number
    type: object
  domain.UpdateCustomerRequest:
    properties:
      email:
        type: string
      name:
        type: string
    type: object
  domain.UpdateOrderStatusRequest:
    properties:
      status:
        enum:
        - pending
        - confirmed
        - shipped
        - delivered
        - cancelled
        type: string
    required:
    - status
    type: object
  domain.UpdateProductRequest:
    properties:
      name:
        type: string
      price:
        type: number
    type: object
  handler.ErrorResponse:
    properties:
      error:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: REST API for a book store backed by PostgreSQL.
  title: Book Store API
  version: "1.0"
paths:
  /customers:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.Customer'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List customers
      tags:
      - customers
    post:
      consumes:
      - application/json
      parameters:
      - description: Customer data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/domain.CreateCustomerRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
